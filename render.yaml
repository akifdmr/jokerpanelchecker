services:
  - type: web
    name: panelcheckers
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: BROWSER_HEADLESS
        value: "1"
      - key: CHECK_ALLOWED_HOSTS
        value: atrtouristik.com
      - key: CHECK_ALLOWED_ROOT_DOMAINS
        value: atrtouristik.com
      - key: CHECK_ENFORCE_ALLOWED_ROOT_DOMAINS
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_USERNAME
        sync: false
      - key: MONGODB_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: USER_USERNAME
        sync: false
      - key: USER_PASSWORD
        sync: false
